<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head>
    <title>Candidates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/style.css?v=22" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <h2 class="mt-4 mb-4">Review Candidates</h2>
    
    <!-- Success and Error Message Polishing UI Hooks -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible shadow-sm">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible shadow-sm">
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="card shadow-sm p-3">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Email Contact</th>
                    <th>Cover Letter Snippet</th>
                    <th>Resume File</th>
                    <th>Date Applied</th>
                    <th>Recruiter Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${applications == null or applications.size() == 0}">
                    <td colspan="5" class="text-center p-4 text-muted">No candidates have applied to this posting yet.</td>
                </tr>
                <tr th:each="app : ${applications}">
                    <td class="fw-bold" th:text="${app.student?.firstName + ' ' + app.student?.lastName}">Name</td>
                    <td><a th:href="'mailto:' + ${app.student?.email}" th:text="${app.student?.email}">Email</a></td>
                    <td><small class="text-muted d-inline-block text-truncate" style="max-width: 200px;" th:text="${app.coverLetter}">Letter</small></td>
                    <td>
                        <a th:href="@{'/applications/resume/' + ${app.resumeUrl}}" class="btn btn-sm btn-outline-primary shadow-sm" title="Download Document">
                            Download Resume
                        </a>
                    </td>
                    <td th:text="${#temporals.format(app.appliedDate, 'MMM dd, yyyy')}">Date</td>
                    <td>
                        <form th:action="@{'/applications/' + ${app.id} + '/status'}" method="post" class="d-flex align-items-center gap-2">
                            <select name="status" class="form-select form-select-sm" style="width: 130px;">
                                <option value="PENDING" th:selected="${app.status.name() == 'PENDING'}">Pending</option>
                                <option value="REVIEWING" th:selected="${app.status.name() == 'REVIEWING'}">Reviewing</option>
                                <option value="ACCEPTED" th:selected="${app.status.name() == 'ACCEPTED'}">Hire / Accept</option>
                                <option value="REJECTED" th:selected="${app.status.name() == 'REJECTED'}">Reject</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-dark">Update</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
