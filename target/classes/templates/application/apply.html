<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head>
    <title>Apply For Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/style.css?v=22" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 mt-4">
            <h2 class="mb-4">Submit Application</h2>
            <div class="alert alert-info">
                Make sure your profile is updated before you apply. The employer will review your profile credentials.
            </div>
			<form th:action="@{/applications/apply/{id}(id=${jobId})}" 
			      th:object="${application}" 
			      method="post" 
			      enctype="multipart/form-data" 
			      class="card shadow-sm p-4">
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Upload Resume (PDF, DOC, DOCX)</label>
                    <input type="file" name="resumeFile" class="form-control" accept=".pdf,.doc,.docx" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Introduce yourself (Cover Letter)</label>
                    <textarea th:field="*{coverLetter}" class="form-control" rows="8" placeholder="Why are you a good fit for this role?" required></textarea>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Submit My Application</button>
                </div>
            </form>
            <div class="mt-3 text-center">
                <a th:href="@{/jobs}" class="text-decoration-none">Back to Postings</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
