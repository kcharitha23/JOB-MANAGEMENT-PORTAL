<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Company Profile - CareerFlow')}">
<body>
    <div th:fragment="content">
        <div class="dashboard-container">
            <aside class="sidebar">
                <div class="nav-side">
                    <h3 class="mb-4 text-primary">Employer Hub</h3>
                    <ul class="nav flex-column gap-2">
                        <li class="nav-item"><a th:href="@{/employer/dashboard}" class="nav-link"><i class="fas fa-layer-group"></i>My Postings</a></li>
                        <li class="nav-item"><a th:href="@{/jobs/create}" class="nav-link"><i class="fas fa-plus-circle"></i>Post a Job</a></li>
                        <li class="nav-item"><a th:href="@{/employer/profile}" class="nav-link active"><i class="fas fa-building"></i>Company Profile</a></li>
                    </ul>
                </div>
            </aside>

            <main class="main-content">
                <header class="mb-4">
                    <h1 th:text="'Welcome, ' + ${user.firstName}">Welcome, Employer</h1>
                    <p class="text-muted">Enhance your employer branding to attract the best talent.</p>
                </header>

                <div class="card border-0 shadow-sm p-4">
                    <h5 class="mb-4 fw-bold">Employer Branding</h5>
                    <form th:action="@{/employer/profile/update}" th:object="${profile}" method="post">
                        <input type="hidden" th:field="*{id}" />
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Company Name</label>
                                <input type="text" th:field="*{companyName}" class="form-control" placeholder="Acme Corp" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Location Headquarter</label>
                                <input type="text" th:field="*{location}" class="form-control" placeholder="New York, NY" />
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Company Website</label>
                            <input type="url" th:field="*{website}" class="form-control" placeholder="https://www.company.com" />
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold">About Us</label>
                            <textarea th:field="*{companyDescription}" class="form-control" rows="5" placeholder="We are building the future of..."></textarea>
                            <div class="form-text">Share your company's mission and culture.</div>
                        </div>
                        
                        <div class="d-grid d-md-flex justify-content-md-start">
                            <button type="submit" class="btn btn-primary px-5 py-2">Save Company Profile</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
