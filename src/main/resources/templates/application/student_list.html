<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head>
    <title>My Applications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/style.css?v=22" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <h2 class="mt-4 mb-4">Application History</h2>
    
    <div class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Applied Date</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${applications == null or applications.size() == 0}">
                    <td colspan="5" class="text-center p-4">You have not submitted any applications yet.</td>
                </tr>
                <tr th:each="app : ${applications}">
                    <td th:text="${app.job?.title}" class="fw-bold">Job</td>
                    <td th:text="${app.job?.employerProfile?.companyName}">Company</td>
                    <td th:text="${app.job?.location}">Location</td>
                    <td>
                        <span th:if="${app.status.name() == 'PENDING'}" class="badge bg-secondary">Pending</span>
                        <span th:if="${app.status.name() == 'REVIEWING'}" class="badge bg-info">Reviewing</span>
                        <span th:if="${app.status.name() == 'ACCEPTED'}" class="badge bg-success">Accepted!</span>
                        <span th:if="${app.status.name() == 'REJECTED'}" class="badge bg-danger">Rejected</span>
                    </td>
                    <td th:text="${#temporals.format(app.appliedDate, 'yyyy-MM-dd HH:mm')}">Date</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
