<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head>
    <title>Oops! Application Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/style.css?v=22" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 text-center">
    <div class="mb-4">
        <!-- Friendly user message instead of generic ugly stack traces -->
        <h1 class="display-1 text-danger fw-bold">Oops!</h1>
        <h3 class="text-muted mt-3">We ran into an unexpected problem processing your request.</h3>
        <p class="mt-4 lead">Don't worry, your data and connection remain secure. 
            <br>The technical issue has been logged, but you can navigate back and try again.</p>
        
        <div class="mt-5">
            <a th:href="@{/}" class="btn btn-primary px-4 py-2 me-2 fw-bold">Return Home</a>
            <a th:href="@{/jobs}" class="btn btn-outline-dark px-4 py-2 fw-bold">Browse Job Marketplace</a>
        </div>
    </div>
</div>
</body>
</html>
