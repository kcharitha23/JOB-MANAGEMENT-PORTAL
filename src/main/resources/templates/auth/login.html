<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Welcome Back - CareerFlow')}">
<body>
    <div th:fragment="content">
        <div class="auth-container">
            <div class="auth-card animate-in">
                <div class="text-center mb-5">
                    <h2 class="fw-bold mb-2">Welcome Back</h2>
                    <p class="text-muted">Enter your credentials to access your account</p>
                </div>

                <!-- Error Messages -->
                <div th:if="${param.error}" class="alert alert-danger py-2 mb-4 text-center" style="font-size: 0.9rem; border-radius: 12px;">
                    Invalid email or password.
                </div>
                <div th:if="${param.logout}" class="alert alert-info py-2 mb-4 text-center" style="font-size: 0.9rem; border-radius: 12px;">
                    You have been logged out.
                </div>
                <div th:if="${param.success}" class="alert alert-success py-2 mb-4 text-center" style="font-size: 0.9rem; border-radius: 12px;">
                    OTP verified. Your account has been created successfully.
                </div>

                <form th:action="@{/auth/login}" method="post">
                    <div class="mb-4">
                        <label class="form-label fw-semibold mb-2">Email</label>
                        <input type="email" name="email" class="form-control py-3 px-4" 
                               placeholder="john@example.com" style="border-radius: 14px;" required autofocus>
                    </div>

                    <div class="mb-5">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label class="form-label fw-semibold mb-0">Password</label>
                            <a href="#" class="text-decoration-none small fw-medium" style="color: #6366f1;">Forgot?</a>
                        </div>
                        <input type="password" name="password" class="form-control py-3 px-4" 
                               placeholder="••••••••" style="border-radius: 14px;" required>
                    </div>

                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary py-3 fw-bold" 
                                style="border-radius: 14px; font-size: 1rem; background: var(--primary-gradient); border: none; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);">
                            Sign In
                        </button>
                    </div>

                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">Don't have an account? 
                            <a th:href="@{/auth/register}" class="text-decoration-none fw-bold" style="color: #8b5cf6;">Register</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
