<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Employer Dashboard - CareerFlow')}">
<body>
    <div th:fragment="content">
        <div class="dashboard-container">
            <aside class="sidebar">
                <div class="nav-side">
                    <h3 class="mb-4 text-primary">Employer Hub</h3>
                    <ul class="nav flex-column gap-2">
                        <li class="nav-item"><a th:href="@{/employer/dashboard}" class="nav-link active"><i class="fas fa-layer-group"></i>My Postings</a></li>
                        <li class="nav-item"><a th:href="@{/jobs/create}" class="nav-link"><i class="fas fa-plus-circle"></i>Post a Job</a></li>
                        <li class="nav-item"><a th:href="@{/employer/profile}" class="nav-link"><i class="fas fa-building"></i>Company Profile</a></li>
                    </ul>
                </div>
            </aside>

            <main class="main-content">
                <header class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 th:text="'Welcome, ' + ${user.firstName}">Welcome, Employer</h1>
                        <p class="text-muted">Manage your job listings and applicants.</p>
                    </div>
                    <a th:href="@{/jobs/create}" class="btn btn-primary">
                        <i class="fas fa-plus me-2"></i>Post New Job
                    </a>
                </header>

                <div class="stats-grid mb-4">
                    <div class="stat-card">
                        <p>Total Postings</p>
                        <h3 th:text="${#lists.size(jobs)}">0</h3>
                    </div>
                </div>

                <div class="card border-0 shadow-sm overflow-hidden">
                    <div class="card-header bg-transparent border-bottom py-3 px-4">
                        <h5 class="mb-0">Recent Job Postings</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4">Job Title</th>
                                    <th>Location</th>
                                    <th>Posted On</th>
                                    <th class="pe-4 text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="job : ${jobs}">
                                    <td class="ps-4 fw-semibold" th:text="${job.title}">Software Engineer</td>
                                    <td th:text="${job.location}">Remote</td>
                                    <td th:text="${#temporals.format(job.postedDate, 'dd MMM yyyy')}">10 Apr 2024</td>
                                    <td class="pe-4 text-end">
                                        <a th:href="@{/applications/job/{id}(id=${job.id})}" class="btn btn-sm btn-outline-primary px-3">View Applicants</a>
                                        <a th:href="@{/jobs/{id}/edit(id=${job.id})}" class="btn btn-sm btn-link text-warning ms-2" title="Edit">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <form th:action="@{/jobs/{id}/delete(id=${job.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-link text-danger" onclick="return confirm('Delete this job?')" title="Delete">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(jobs)}">
                                    <td colspan="4" class="text-center py-5 text-muted">No jobs posted yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
